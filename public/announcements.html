<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Announcements — Mariki Family Portal</title>
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://unpkg.com/lucide@latest"></script>
<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
<link rel="stylesheet" href="css/styles.css" />
</head>
<body>
  <div class="max-w-5xl mx-auto px-4 py-6">
    <div id="topbar"></div>

    <section class="flex items-center justify-between mb-4">
      <h1 class="text-xl font-bold flex items-center gap-2"><i data-lucide="megaphone"></i> Announcements <span id="badge" class="badge hidden">0</span></h1>
    </section>

    <section id="adminPanel" class="glass p-5 mb-5 hidden">
      <form id="newsForm" class="grid gap-3">
        <input class="input" name="title" placeholder="Title" required>
        <textarea class="input" name="body" rows="3" placeholder="Write your announcement..." required></textarea>
        <div><button class="btn-primary"><i data-lucide="send-horizontal" class="w-4 h-4 inline"></i> Post</button></div>
      </form>
    </section>

    <section id="list" class="space-y-3"><div class="skeleton h-20"></div><div class="skeleton h-20"></div></section>

    <div id="bottombar"></div>
  </div>
<script type="module" src="js/announcements.js"></script>
</body>
</html>
