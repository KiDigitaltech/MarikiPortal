<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Contributions — Mariki Family Portal</title>
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://unpkg.com/lucide@latest"></script>
<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
<link rel="stylesheet" href="css/styles.css" />
</head>
<body>
  <div class="max-w-6xl mx-auto px-4 py-6">
    <div id="topbar"></div>

    <section id="adminPanel" class="glass p-5 mb-5 hidden fade-in">
      <div class="font-semibold mb-3">Create contribution type (admin)</div>
      <form id="typeForm" class="grid md:grid-cols-5 gap-3">
        <input class="input md:col-span-2" name="title" placeholder="Title" required>
        <input class="input" name="amount" type="number" min="0" step="0.01" placeholder="Amount" required>
        <input class="input" name="unit" placeholder="Unit (Tsh, Kg)" value="Tsh" required>
        <button class="btn-primary"><i data-lucide="plus" class="w-4 h-4 inline"></i> Create</button>
        <textarea class="input md:col-span-5" name="description" placeholder="Description"></textarea>
      </form>
    </section>

    <section class="grid md:grid-cols-2 gap-5">
      <div class="glass p-5">
        <div class="font-semibold mb-3"><i data-lucide="list" class="w-4 h-4 inline"></i> Available contributions</div>
        <div id="typesList" class="space-y-3"><div class="skeleton h-12"></div><div class="skeleton h-12"></div></div>
      </div>
      <div class="glass p-5">
        <div class="font-semibold mb-3"><i data-lucide="history" class="w-4 h-4 inline"></i> My history</div>
        <div id="historyList" class="space-y-2 max-h-[460px] overflow-auto scroll-hide"><div class="skeleton h-10"></div></div>
      </div>
    </section>

    <div id="bottombar"></div>
  </div>
<script type="module" src="js/contributions.js"></script>
</body>
</html>
