<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Register — Mariki Family Portal</title>
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://unpkg.com/lucide@latest"></script>
<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
<link rel="stylesheet" href="css/styles.css" />
</head>
<body>
  <main class="min-h-screen px-4 py-10">
    <div class="glass max-w-3xl mx-auto p-8 pop-in">
      <div class="flex items-center gap-3 mb-6">
        <div class="w-12 h-12 rounded-2xl flex items-center justify-center" style="background:linear-gradient(135deg,#6366f1,#06b6d4)">
          <i data-lucide="user-plus" class="text-white"></i>
        </div>
        <div>
          <h1 class="text-2xl font-bold">Create your account</h1>
          <p class="opacity-70 text-sm">Join the Mariki Family Portal</p>
        </div>
      </div>

      <form id="regForm" class="grid md:grid-cols-2 gap-4">
        <div><label>First name</label><input class="input" name="firstName" required></div>
        <div><label>Middle name</label><input class="input" name="middleName"></div>
        <div><label>Last name</label><input class="input" name="lastName" required></div>
        <div><label>Date of birth</label><input class="input" type="date" name="dob" required></div>
        <div><label>Gender</label>
          <select class="input" name="gender" required>
            <option value="">Select</option><option>Male</option><option>Female</option>
          </select>
        </div>
        <div><label>Phone</label><input class="input" name="phone" placeholder="+2557XXXXXXXX" required></div>
        <div><label>Email</label><input class="input" type="email" name="email" required></div>
        <div><label>Password</label><input class="input" type="password" name="password" minlength="6" required></div>
        <div><label>Occupation</label><input class="input" name="occupation"></div>
        <div><label>Region</label><select class="input" id="region" name="region" required></select></div>
        <div><label>District</label><select class="input" id="district" name="district" required><option value="">Select region first</option></select></div>

        <div><label>Profile image</label><input class="input" type="file" id="profileFile" accept="image/*"></div>
        <div class="flex items-end"><img id="profilePreview" class="rounded-lg border border-white/10" style="max-height:80px;display:none"/></div>

        <div class="md:col-span-2"><label>Relationship</label>
          <select class="input" id="relationship" name="relationship" required>
            <option value="none">None</option>
            <option value="married">Married</option>
            <option value="engaged">Engaged</option>
          </select>
        </div>

        <div id="partnerBlock" class="md:col-span-2 grid md:grid-cols-2 gap-4 hidden">
          <div class="md:col-span-2 font-semibold opacity-80">Partner details</div>
          <div><label>Partner first name</label><input class="input" name="partnerFirstName"></div>
          <div><label>Partner middle name</label><input class="input" name="partnerMiddleName"></div>
          <div><label>Partner last name</label><input class="input" name="partnerLastName"></div>
          <div><label>Partner phone</label><input class="input" name="partnerPhone"></div>
          <div><label>Partner image</label><input class="input" type="file" id="partnerFile" accept="image/*"></div>
          <div class="flex items-end"><img id="partnerPreview" class="rounded-lg border border-white/10" style="max-height:80px;display:none"/></div>
        </div>

        <div class="md:col-span-2 flex items-center justify-between mt-2">
          <a href="login.html" class="text-sm underline opacity-80">Have an account? Sign in</a>
          <button class="btn-primary inline-flex items-center gap-2" id="submitBtn">
            <i data-lucide="check" class="w-4 h-4"></i> Create account
          </button>
        </div>
      </form>
    </div>
  </main>
<script type="module" src="js/register.js"></script>
<script>lucide.createIcons();</script>
</body>
</html>
