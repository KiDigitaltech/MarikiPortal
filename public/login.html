<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Login — Mariki Family Portal</title>
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://unpkg.com/lucide@latest"></script>
<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
<link rel="stylesheet" href="css/styles.css" />
</head>
<body>
  <main class="min-h-screen flex items-center justify-center px-4">
    <div class="glass p-8 w-full max-w-md pop-in">
      <div class="text-center mb-6">
        <div class="w-14 h-14 mx-auto rounded-2xl flex items-center justify-center mb-3" style="background:linear-gradient(135deg,#6366f1,#06b6d4)">
          <i data-lucide="log-in" class="text-white"></i>
        </div>
        <h1 class="text-2xl font-bold">Welcome back</h1>
        <p class="opacity-70 text-sm">Sign in to continue to your portal</p>
      </div>
      <form id="loginForm" class="space-y-4">
        <div><label>Email</label><input class="input" type="email" name="email" required></div>
        <div><label>Password</label><input class="input" type="password" name="password" required minlength="6"></div>
        <button class="btn-primary w-full inline-flex items-center justify-center gap-2" id="submitBtn">
          <i data-lucide="log-in" class="w-4 h-4"></i> Sign in
        </button>
      </form>
      <p class="text-sm text-center mt-5 opacity-80">No account? <a href="register.html" class="underline">Create one</a></p>
    </div>
  </main>
<script type="module" src="js/login.js"></script>
<script>lucide.createIcons();</script>
</body>
</html>
